<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Feltjournal v2.0.9</title>
<style>
  :root{
    --paper: #EFEDE6;
    --ink: #232620;
    --moss: #4B5D45;
    --moss-dark: #34412F;
    --clay: #A8562E;
    --line: #C9C4B4;
    --card: #F7F5EF;
    --mono: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;
    --serif: 'Source Serif 4', Georgia, serif;
    --sans: 'Inter', -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:var(--sans); padding:0 0 60px 0;
    -webkit-tap-highlight-color: transparent;
  }
  @font-face{
    font-family:'Source Serif 4';
    src: local('Georgia');
  }
  .wrap{max-width:760px; margin:0 auto; padding:20px 14px;}

  header.top{
    display:flex; justify-content:space-between; align-items:flex-end;
    border-bottom:1px solid var(--line); padding-bottom:14px; margin-bottom:6px;
  }
  header.top h1{
    font-family:var(--serif); font-weight:600; font-size:26px; margin:0; letter-spacing:-0.01em;
  }
  header.top h1 a.sheet-link{
    font-family:var(--mono); font-size:12px; color:var(--clay); margin-left:6px; 
    vertical-align:middle; text-decoration:none; border: 1px solid var(--line); 
    padding: 2px 6px; border-radius: 4px; background: rgba(168, 86, 46, 0.05);
    transition: all 0.1s ease; display: inline-block;
  }
  header.top h1 a.sheet-link:hover{
    background: var(--clay); color: #fff; border-color: var(--clay);
  }
  header.top .sub{font-family:var(--mono); font-size:10px; color:var(--moss-dark); text-transform:uppercase; letter-spacing:0.08em;}

  .datebar{
    display:flex; align-items:center; gap:10px; margin:14px 0 24px 0;
    font-family:var(--mono); font-size:13px;
  }
  .datebar button{
    background:none; border:1px solid var(--line); color:var(--ink);
    width:34px; height:34px; border-radius:4px; cursor:pointer; font-family:var(--mono); font-size:16px;
    display:flex; align-items:center; justify-content:center;
  }
  .datebar button:hover:not(:disabled){border-color:var(--moss);}
  .datebar button:disabled{opacity:0.3; cursor:not-allowed;}
  .datebar .status{margin-left:auto; font-size:11px; color:#8b8578;}
  .datebar .dateDisplay{
    font-family:var(--mono); font-size:14px; border:1px solid var(--line);
    background:var(--card); padding:6px 12px; border-radius:4px; color:var(--ink);
    cursor:pointer; user-select:none; font-weight:600;
  }

  section.block{
    background:var(--card); border:1px solid var(--line); border-radius:4px;
    padding:16px 16px; margin-bottom:14px;
  }
  section.block h2{
    font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.09em;
    color:var(--moss-dark); margin:0 0 14px 0; font-weight:600;
  }

  .tags{display:flex; flex-wrap:wrap; gap:8px;}
  .tag{
    font-family:var(--sans); font-size:13.5px; padding:8px 14px; border-radius:20px;
    border:1px solid var(--line); background:transparent; cursor:pointer; color:var(--ink);
    transition:all .12s ease;
  }
  .tag.on{background:var(--moss); border-color:var(--moss); color:#fff;}

  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media(max-width:520px){.grid2{grid-template-columns:1fr; gap:10px;}}

  .field{margin-bottom:12px;}
  .field label{
    display:block; font-size:12px; color:#6b6656; margin-bottom:6px; font-family:var(--sans); font-weight:500;
  }
  
  .intake-buttons {
    display: flex; gap: 6px; margin-top: 4px;
  }
  .intake-btn {
    flex: 1; font-family: var(--mono); font-size: 14px; padding: 10px 0;
    background: transparent; border: 1px solid var(--line); border-radius: 4px;
    color: var(--ink); cursor: pointer; transition: all 0.1s ease; text-align: center;
  }
  .intake-btn.active {
    background: var(--moss); border-color: var(--moss); color: #fff; font-weight: 600;
  }

  .scale{display:flex; align-items:center; gap:12px;}
  .scale input[type=range]{flex:1; accent-color:var(--clay); height:24px;}
  .scale .val{
    font-family:var(--mono); font-size:18px; width:28px; text-align:center; color:var(--clay); font-weight:600;
  }

  .healthgrid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px;}
  @media(max-width:520px){.healthgrid{grid-template-columns:1fr; gap:10px;}}

  .healthgrid input[readonly] {
    background-color: rgba(201, 196, 180, 0.15);
    border-color: var(--line);
    color: #555;
    cursor: not-allowed;
  }
  .healthgrid .num-row { display: flex; align-items: center; gap: 8px; }
  .healthgrid input[type=number] {
    width:100%; font-family:var(--mono); font-size:16px; border:1px solid var(--line);
    background:#fff; padding:10px 12px; border-radius:4px; color:var(--ink);
  }
  input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  input[type=number] { -moz-appearance: textfield; }

  .sign-toggle-btn {
    background: none; border: 1px solid var(--line); border-radius: 4px;
    font-family: var(--mono); font-size: 14px; font-weight: bold; width: 44px; height: 41px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.1s ease; user-select: none; color: var(--ink);
  }
  .sign-toggle-btn.minus-active {
    background: rgba(75, 93, 69, 0.1); border-color: var(--moss); color: var(--moss-dark);
  }
  .sign-toggle-btn.plus-active {
    background: rgba(168, 86, 46, 0.1); border-color: var(--clay); color: var(--clay);
  }

  .history{margin-top:26px; overflow-x: auto;}
  .history h2{
    font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:0.09em;
    color:var(--moss-dark); margin:0 0 10px 0;
  }
  table.log{width:100%; border-collapse:collapse; font-size:12.5px; font-family:var(--mono); min-width: 400px;}
  table.log th, table.log td{
    text-align:left; padding:8px 6px; border-bottom:1px solid var(--line);
  }
  table.log th{color:#8b8578; font-weight:500; text-transform:uppercase; font-size:10px; letter-spacing:0.05em;}
  table.log tr:hover td{background:rgba(75,93,69,0.05);}
  table.log .rowdate{cursor:pointer; color:var(--moss-dark); font-weight:600;}
  .empty{color:#a39d8c; font-size:13px; font-style:italic; padding:6px 0;}
  
  .sync-box {
    background: var(--card); border: 1px solid var(--line); border-radius: 4px;
    padding: 12px 14px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  @media(max-width:400px){.sync-box{flex-direction: column; align-items: flex-start; gap:8px;}}
  .sync-info { font-family: var(--sans); font-size: 13px; color: var(--ink); }
  .sync-info span { font-family: var(--mono); font-weight: 600; }
  .error-msg { font-family: var(--mono); font-size: 11px; color: var(--clay); margin-top: 4px; font-weight: 600; }
  .btn-small {
    background: none; border: 1px solid var(--moss); color: var(--moss);
    padding: 8px 14px; border-radius: 4px; cursor: pointer; font-family: var(--sans); font-size: 12px; font-weight: 500;
  }
  .btn-small:hover { background: var(--moss); color: #fff; }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <h1>Feltjournal<a href="https://docs.google.com/spreadsheets/d/1uFnrJx3lMMOzJLPY3oFjf8Kyi8WzssVumjs4ntudIAc/edit" target="_blank" class="sheet-link">v2.0.9</a></h1>
    <div class="sub">helse · vaner · sensor</div>
  </header>

  <div class="datebar">
    <button id="prevDay">‹</button>
    <input type="date" id="dateInput" lang="nb-NO" style="display:none;">
    <span class="dateDisplay" id="dateDisplay"></span>
    <button id="nextDay">›</button>
    <span class="status" id="saveStatus">klar</span>
  </div>

  <div class="sync-box">
    <div class="sync-info">
      Google Status: <span id="googleStatus">venter...</span>
      <div class="error-msg" id="sheetError" style="display:none;"></div>
    </div>
    <div>
      <button id="googleConnectBtn" class="btn-small" style="border-color: var(--line); color: var(--ink);">Logg inn med Google</button>
      <button id="fetchHealthBtn" class="btn-small" style="display:none;">Hent på nytt</button>
    </div>
  </div>

  <section class="block">
    <h2>Vaner</h2>
    <div class="tags" id="habitTags"></div>
  </section>

  <section class="block">
    <h2>Kosttilskudd</h2>
    <div class="tags" id="suppTags"></div>
  </section>

  <section class="block">
    <h2>Kosthold</h2>
    <div class="tags" id="dietTags"></div>
  </section>

  <section class="block">
    <h2>Inntak</h2>
    <div class="grid2">
      <div class="field">
        <label>Alkohol (enheter)</label>
        <div class="intake-buttons" id="alkoholButtons"></div>
      </div>
      <div class="field">
        <label>Koffein (kopper)</label>
        <div class="intake-buttons" id="koffeinButtons"></div>
      </div>
    </div>
  </section>

  <section class="block">
    <h2>Tilstand (1–9)</h2>
    <div id="scales"></div>
  </section>

  <section class="block">
    <h2>Helsedata &amp; CO2</h2>
    <div class="healthgrid" id="healthFields"></div>
  </section>

  <div class="history">
    <h2>Siste 10 oppføringer</h2>
    <div id="historyTable"></div>
  </div>

</div>

<script>
const HABITS = ["Trene styrke","Trene kardio","Lese","Gå til jobb","PMO","Dagslys/utendørs"];
const SUPPS = ["Vitamin C","Vitamin D","Tran"];
const DIET = ["Ultraprosessert mat","Sukker"];
const SCALES = [{key:"brainfog", label:"Brainfog"}, {key:"energi", label:"Energinivå"}, {key:"stress", label:"Stressnivå"}];
const HEALTH = [
  {key:"steg", unit:"steg", isAuto: true},
  {key:"sovn", unit:"timer", isAuto: true},
  {key:"vekt", unit:"kg", isAuto: true},
  {key:"kal_brukt", unit:"kcal", isAuto: true},
  {key:"kal_balanse", unit:"kcal, +/-", isAuto: false},
  {key:"co2_snitt", unit:"ppm", isAuto: false},
  {key:"co2_max", unit:"ppm", isAuto: false}
];

function getFieldLabel(key) {
  if (key === "steg") return "Steg";
  if (key === "sovn") return "Søvn";
  if (key === "vekt") return "Vekt";
  if (key === "kal_brukt") return "Kalorier brukt (Garmin)";
  if (key === "kal_balanse") return "Kaloribalanse (Yazio)";
  if (key === "co2_snitt") return "CO2 soverom, snitt";
  if (key === "co2_max") return "CO2 soverom, maks";
  return key;
}

const INTAKE_OPTIONS = ["0", "1", "2", "3", "4+"];
const GOOGLE_CLIENT_ID = "924886961527-tt2ogcajaofpdtrf0t61r3tpk72tqhi8.apps.googleusercontent.com";
const SHEETS_SCOPE = "https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/fitness.activity.read https://www.googleapis.com/auth/fitness.body.read https://www.googleapis.com/auth/fitness.sleep.read";
const SHEET_HEADERS = ["Dato","Dag","Trene styrke","Trene kardio","Lese","Gå til jobb","PMO","Dagslys/utendørs","Vitamin C","Vitamin D","Tran","Ultraprosessert mat","Sukker","Alkohol","Koffein","Brainfog","Energi","Stress","Steg","Søvn","HRV","Vekt","Kalorier brukt","Kaloribalanse","CO2 snitt","CO2 maks"];
const NORSKE_DAGER = ["Søndag","Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag"];
function norskDag(dateStr){ const d = new Date(dateStr+"T00:00:00"); return NORSKE_DAGER[d.getDay()]; }
let googleAccessToken = null; let tokenClient = null; let spreadsheetId = null; let saveTimeout = null;
const todayStr = new Date().toISOString().slice(0,10); let currentDate = todayStr; let currentEntry = emptyEntry(); let weightDateLabel = "";
let sheetEntries = {};

function emptyEntry(){ return { habits:{}, supps:{}, diet:{}, alkohol:"", koffein:"", scales:{brainfog:5, energi:5, stress:5}, health:{} }; }
function setGoogleStatus(text, isError=false) { const el = document.getElementById("googleStatus"); el.textContent = text; el.style.color = isError ? "var(--clay)" : "var(--moss-dark)"; if (!isError) document.getElementById("sheetError").style.display = "none"; }
const KNOWN_SPREADSHEET_ID = "1uFnrJx3lMMOzJLPY3oFjf8Kyi8WzssVumjs4ntudIAc";
function showSheetError(msg) { const el = document.getElementById("sheetError"); el.textContent = msg; el.style.display = "block"; }
function googleScriptLoaded() { setGoogleStatus("ikke tilkoblet"); initGoogleAuth(); }

function initGoogleAuth(){
  if(!window.google || !google.accounts?.oauth2){ return; }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID, scope: SHEETS_SCOPE,
    callback: async (resp)=>{
      if(resp.error){ setGoogleStatus("innlogging feilet", true); return; }
      googleAccessToken = resp.access_token;
      setGoogleStatus("tilkoblet ✓");
      document.getElementById("googleConnectBtn").style.display = "none";
      document.getElementById("fetchHealthBtn").style.display = "inline-block";
      spreadsheetId = KNOWN_SPREADSHEET_ID;
      await loadEntry(currentDate);
    }
  });
}
document.getElementById("googleConnectBtn").onclick = ()=>{ if(!tokenClient){ initGoogleAuth(); } tokenClient.requestAccessToken(); };

async function loadSheetEntries() {
  if (!googleAccessToken || !spreadsheetId) return;
  try {
    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Logg!A:Z`, { headers: { "Authorization": "Bearer " + googleAccessToken } });
    if (!res.ok) return;
    const data = await res.json();
    const rows = data.values || [];
    if (rows.length <= 1) return;
    sheetEntries = {}; 
    for (let i = 1; i < rows.length; i++) {
      const r = rows[i];
      const dateStr = r[0];
      if (!dateStr) continue;
      const entry = emptyEntry();
      const getVal = (headerName) => { 
        const idx = SHEET_HEADERS.indexOf(headerName); 
        let rawVal = (idx !== -1 && r[idx] !== undefined) ? r[idx] : "";
        if (typeof rawVal === "string") return rawVal.trim();
        return rawVal;
      };
      
      HABITS.forEach(h => { entry.habits[h] = getVal(h) === "1"; });
      SUPPS.forEach(s => { entry.supps[s] = getVal(s) === "1"; });
      DIET.forEach(d => { entry.diet[d] = getVal(d) === "1"; });
      entry.alkohol = getVal("Alkohol") === "4" ? "4+" : getVal("Alkohol");
      entry.koffein = getVal("Koffein") === "4" ? "4+" : getVal("Koffein");
      entry.scales.brainfog = parseInt(getVal("Brainfog"), 10) || 5;
      entry.scales.energi = parseInt(getVal("Energi"), 10) || 5;
      entry.scales.stress = parseInt(getVal("Stress"), 10) || 5;
      
      HEALTH.forEach(h => {
        const sheetName = h.key === "kal_brukt" ? "Kalorier brukt" : (h.key === "kal_balanse" ? "Kaloribalanse" : (h.key === "co2_snitt" ? "CO2 snitt" : (h.key === "co2_max" ? "CO2 maks" : getFieldLabel(h.key))));
        let raw = getVal(sheetName);
        if (raw !== "") {
          if (typeof raw === "string") {
            raw = raw.replace(",", ".").replace("−", "-");
          }
          entry.health[h.key] = Number(raw);
        } else {
          entry.health[h.key] = "";
        }
      });
      sheetEntries[dateStr] = entry;
    }
  } catch (err) { console.error("Klarte ikke hente historikk fra Sheets:", err); }
}

async function fetchAllHealthData(dateStr, forceOverwrite = false) {
  if (!googleAccessToken) return;
  const targetDateAtCall = dateStr;
  const [y, m, d] = dateStr.split('-').map(Number);
  
  const startNano = BigInt(Date.UTC(y, m - 1, d)) * 1000000n;
  const endNano = BigInt(Date.UTC(y, m - 1, d, 23, 59, 59)) * 1000000n;
  
  const prevDateStr = shiftDate(dateStr, -1);
  const [py, pm, pd] = prevDateStr.split('-').map(Number);
  const sleepStartNano = BigInt(Date.UTC(py, pm - 1, pd, 18, 0, 0)) * 1000000n;
  const sleepEndNano = BigInt(Date.UTC(y, m - 1, d, 12, 0, 0)) * 1000000n;
  
  const headers = { "Authorization": "Bearer " + googleAccessToken };
  let newHealthData = {}; let found = false;
  
  try {
    const sRes = await fetch(`https://www.googleapis.com/fitness/v1/users/me/dataSources/derived:com.google.step_count.delta:com.google.android.gms:estimated_steps/datasets/${startNano}-${endNano}`, { headers });
    if (sRes.ok) { const d = await sRes.json(); let s = 0; d.point?.forEach(p => s += p.value?.[0]?.intVal || 0); if (s > 0 || forceOverwrite) { newHealthData.steg = s; found = true; } }
    
    const cRes = await fetch(`https://www.googleapis.com/fitness/v1/users/me/dataSources/derived:com.google.calories.expended:com.google.android.gms:merge_calories_expended/datasets/${startNano}-${endNano}`, { headers });
    if (cRes.ok) { const d = await cRes.json(); let c = 0; d.point?.forEach(p => c += p.value?.[0]?.fpVal || 0); if (c > 0 || forceOverwrite) { newHealthData.kal_brukt = Math.round(c); found = true; } }
    
    const slRes = await fetch(`https://www.googleapis.com/fitness/v1/users/me/dataSources/derived:com.google.sleep.segment:com.google.android.gms:merged/datasets/${sleepStartNano}-${sleepEndNano}`, { headers });
    if (slRes.ok) { const d = await slRes.json(); let ms = 0; d.point?.forEach(p => ms += Number(BigInt(p.endTimeNanos) - BigInt(p.startTimeNanos)) / 1000000); if (ms > 0 || forceOverwrite) { newHealthData.sovn = Math.round((ms / (1000 * 60 * 60)) * 10) / 10; found = true; } }

    const wRes = await fetch(`https://www.googleapis.com/fitness/v1/users/me/dataSources/derived:com.google.weight:com.google.android.gms:merge_weight/datasets/${startNano}-${endNano}`, { headers });
    if (wRes.ok) { 
      const d = await wRes.json(); 
      if (d.point?.length > 0) { 
        let w = d.point[d.point.length - 1].value?.[0]?.fpVal || 0; 
        if (w > 0) { newHealthData.vekt = Math.round(w * 10) / 10; found = true; weightDateLabel = ""; } 
      } 
    }
    if (!newHealthData.vekt) {
      const fallback = findLastRegisteredWeight(dateStr);
      if (fallback) { newHealthData.vekt = fallback.weight; weightDateLabel = fallback.label; found = true; }
    }
    if (found && targetDateAtCall === currentDate) {
      for (const k in newHealthData) { if (newHealthData[k] !== undefined || forceOverwrite) currentEntry.health[k] = newHealthData[k]; }
      renderHealth();
      await executeSaveDirectly();
    }
    setGoogleStatus("tilkoblet ✓");
  } catch (err) { setGoogleStatus("henting feilet", true); }
}

function findLastRegisteredWeight(beforeDateStr) {
  const keys = [];
  for(let i=0; i<localStorage.length; i++) { const k = localStorage.key(i); if(k.startsWith("entry:")) keys.push(k); }
  Object.keys(sheetEntries).forEach(d => keys.push("entry:" + d));
  const uniqueKeys = Array.from(new Set(keys)).sort().reverse();
  for(const k of uniqueKeys) {
    const date = k.replace("entry:", "");
    if (date < beforeDateStr) {
      let e = null;
      const stored = localStorage.getItem(k);
      if(stored) e = JSON.parse(stored);
      if(!e && sheetEntries[date]) e = sheetEntries[date];
      if (e?.health?.vekt) {
        const [_, m, d] = date.split("-");
        return { weight: e.health.vekt, label: ` (${d}.${m})` };
      }
    }
  }
  return null;
}

function entryToRow(dateStr, entry){
  const row = new Array(SHEET_HEADERS.length).fill("");
  row[SHEET_HEADERS.indexOf("Dato")] = "'" + dateStr;
  row[SHEET_HEADERS.indexOf("Dag")] = norskDag(dateStr);
  HABITS.forEach(h => { row[SHEET_HEADERS.indexOf(h)] = entry.habits[h] ? "1" : "0"; });
  SUPPS.forEach(s => { row[SHEET_HEADERS.indexOf(s)] = entry.supps[s] ? "1" : "0"; });
  DIET.forEach(d => { row[SHEET_HEADERS.indexOf(d)] = entry.diet[d] ? "1" : "0"; });
  row[SHEET_HEADERS.indexOf("Alkohol")] = entry.alkohol === "4+" ? "4" : (entry.alkohol || "");
  row[SHEET_HEADERS.indexOf("Koffein")] = entry.koffein === "4+" ? "4" : (entry.koffein || "");
  row[SHEET_HEADERS.indexOf("Brainfog")] = entry.scales.brainfog ?? "";
  row[SHEET_HEADERS.indexOf("Energi")] = entry.scales.energi ?? "";
  row[SHEET_HEADERS.indexOf("Stress")] = entry.scales.stress ?? "";
  HEALTH.forEach(h => { 
    const sheetName = h.key === "kal_brukt" ? "Kalorier brukt" : (h.key === "kal_balanse" ? "Kaloribalanse" : (h.key === "co2_snitt" ? "CO2 snitt" : (h.key === "co2_max" ? "CO2 maks" : getFieldLabel(h.key))));
    row[SHEET_HEADERS.indexOf(sheetName)] = entry.health[h.key] !== "" ? String(entry.health[h.key]).replace(".", ",") : ""; 
  });
  return row;
}

let syncQueue = Promise.resolve();
async function syncToSheet(dateStr, entry){ syncQueue = syncQueue.then(()=> doSyncToSheet(dateStr, entry)); return syncQueue; }

async function doSyncToSheet(dateStr, entry){
  if(!googleAccessToken || !spreadsheetId) return;
  try{
    const getRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Logg!A:A`, { headers:{ "Authorization":"Bearer "+googleAccessToken } });
    if (!getRes.ok) { showSheetError(`Kunne ikke lese ark-rader: Status ${getRes.status}`); return; }
    const getData = await getRes.json(); const rows = getData.values || [];
    let rowIndex = rows.findIndex(r => r[0] === dateStr); const row = entryToRow(dateStr, entry);
    let sheetRowNum = (rowIndex >= 0 && rows[rowIndex] && rows[rowIndex][0] === dateStr) ? (rowIndex + 1) : (rows.length + 1);
    const endLetter = String.fromCharCode(65 + SHEET_HEADERS.length - 1); 
    const targetUrl = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/Logg!A${sheetRowNum}:${endLetter}${sheetRowNum}?valueInputOption=USER_ENTERED`;
    const writeRes = await fetch(targetUrl, { method: "PUT", headers:{ "Authorization":"Bearer "+googleAccessToken, "Content-Type":"application/json" }, body: JSON.stringify({ values:[row] }) });
    if (!writeRes.ok) { const errData = await writeRes.json().catch(() => ({})); showSheetError(`Skriving feilet: ${errData.error?.message || writeRes.statusText}`); } else { document.getElementById("sheetError").style.display = "none"; }
  } catch(err) { showSheetError(`Nettverksfeil ved skriving: ${err.message}`); }
}

function renderTags(containerId, list, storeKey){
  const c = document.getElementById(containerId); c.innerHTML = "";
  list.forEach(name=>{
    const btn = document.createElement("button"); btn.className = "tag" + (currentEntry[storeKey][name] ? " on" : ""); btn.textContent = name;
    btn.onclick = ()=>{ currentEntry[storeKey][name] = !currentEntry[storeKey][name]; btn.classList.toggle("on"); triggerDebouncedSave(); };
    c.appendChild(btn);
  });
}

function renderScales(){
  const c = document.getElementById("scales"); c.innerHTML = "";
  SCALES.forEach(s=>{
    const row = document.createElement("div"); row.className = "field";
    row.innerHTML = `<label>${s.label}</label><div class="scale"><input type="range" min="1" max="9" step="1" value="${currentEntry.scales[s.key] ?? 5}"><span class="val">${currentEntry.scales[s.key] ?? 5}</span></div>`;
    const input = row.querySelector("input"); const val = row.querySelector(".val");
    input.oninput = ()=>{ val.textContent = input.value; currentEntry.scales[s.key] = parseInt(input.value,10); };
    input.onchange = ()=>{ triggerDebouncedSave(); };
    c.appendChild(row);
  });
}

function renderHealth(){
  const c = document.getElementById("healthFields"); c.innerHTML = "";
  HEALTH.forEach(h=>{
    const f = document.createElement("div"); f.className = "field";
    let displayLabel = getFieldLabel(h.key); if (h.key === "vekt" && weightDateLabel !== "") { displayLabel = `${displayLabel}${weightDateLabel}`; }
    const readonlyAttr = h.isAuto ? "readonly" : "";
    
    if (h.key === "kal_balanse") {
      const val = currentEntry.health[h.key] ?? "";
      const isMinus = typeof val === "number" && val < 0;
      const displayVal = val !== "" ? Math.abs(val) : "";
      
      let btnClass = "sign-toggle-btn";
      if (val !== "") {
        btnClass += isMinus ? " minus-active" : " plus-active";
      }
      const btnChar = isMinus ? "–" : "+";

      f.innerHTML = `
        <label>${displayLabel}</label>
        <div class="num-row">
          <button type="button" class="${btnClass}" id="balSignBtn">${btnChar}</button>
          <input type="number" pattern="[0-9]*" inputmode="numeric" value="${displayVal}" placeholder="0" style="flex:1;">
          <span class="unit">${h.unit}</span>
        </div>`;
      
      const input = f.querySelector("input");
      const btn = f.querySelector("#balSignBtn");
      
      input.oninput = ()=>{
        const parsedAbs = input.value !== "" ? Math.abs(Number(input.value)) : "";
        if (parsedAbs === "") {
          currentEntry.health[h.key] = "";
          btn.className = "sign-toggle-btn";
          btn.textContent = "+";
        } else {
          const currentIsMinus = btn.textContent === "–";
          currentEntry.health[h.key] = currentIsMinus ? -parsedAbs : parsedAbs;
          btn.className = "sign-toggle-btn " + (currentIsMinus ? "minus-active" : "plus-active");
        }
        triggerDebouncedSave();
      };

      btn.onclick = ()=>{
        const parsedAbs = input.value !== "" ? Math.abs(Number(input.value)) : "";
        if (btn.textContent === "+") {
          btn.textContent = "–";
          btn.className = "sign-toggle-btn minus-active";
          if (parsedAbs !== "") currentEntry.health[h.key] = -parsedAbs;
        } else {
          btn.textContent = "+";
          btn.className = "sign-toggle-btn plus-active";
          if (parsedAbs !== "") currentEntry.health[h.key] = parsedAbs;
        }
        triggerDebouncedSave();
      };

    } else {
      f.innerHTML = `<label>${displayLabel}</label><div class="num-row"><input type="number" step="any" ${readonlyAttr} value="${currentEntry.health[h.key] ?? ''}"><span class="unit">${h.unit}</span></div>`;
      const input = f.querySelector("input"); 
      if (!h.isAuto) { 
        input.oninput = ()=>{ currentEntry.health[h.key] = input.value !== "" ? Number(input.value) : ""; triggerDebouncedSave(); }; 
      }
    }
    c.appendChild(f);
  });
}

function renderIntakeButtons(containerId, storeKey) {
  const container = document.getElementById(containerId); container.innerHTML = "";
  INTAKE_OPTIONS.forEach(opt => {
    const btn = document.createElement("button"); btn.className = "intake-btn" + (currentEntry[storeKey] === opt ? " active" : ""); btn.textContent = opt;
    btn.onclick = () => { currentEntry[storeKey] = opt; container.querySelectorAll(".intake-btn").forEach(b => b.classList.remove("active")); btn.classList.add("active"); triggerDebouncedSave(); };
    container.appendChild(btn);
  });
}

function renderIntake(){ renderIntakeButtons("alkoholButtons", "alkohol"); renderIntakeButtons("koffeinButtons", "koffein"); }
function renderAll(){ renderTags("habitTags", HABITS, "habits"); renderTags("suppTags", SUPPS, "supps"); renderTags("dietTags", DIET, "diet"); renderScales(); renderHealth(); renderIntake(); }
function triggerDebouncedSave(){ document.getElementById("saveStatus").textContent = "endret…"; clearTimeout(saveTimeout); saveTimeout = setTimeout(executeSaveDirectly, 1000); }

async function executeSaveDirectly(){
  const snapshotDate = currentDate; const snapshotEntry = JSON.parse(JSON.stringify(currentEntry));
  if(googleAccessToken && spreadsheetId) await syncToSheet(snapshotDate, snapshotEntry);
  localStorage.setItem("entry:" + snapshotDate, JSON.stringify(snapshotEntry));
  if (snapshotDate === currentDate) { document.getElementById("saveStatus").textContent = "lagret"; renderHistory(); }
}

// ENDRET I v2.0.9: Last inn dagen sikkert, og kjør umiddelbar helsedata-henting i bakgrunnen
async function loadEntry(dateStr) {
  document.getElementById("saveStatus").textContent = "laster…"; weightDateLabel = "";
  
  if (googleAccessToken && spreadsheetId) { 
    await loadSheetEntries(); 
  }
  
  let sheetData = sheetEntries[dateStr] || null;
  let localData = null; 
  const stored = localStorage.getItem("entry:" + dateStr); 
  if(stored) localData = JSON.parse(stored);
  
  if (googleAccessToken && spreadsheetId) {
    if (sheetData) {
      currentEntry = sheetData;
      localStorage.setItem("entry:" + dateStr, JSON.stringify(sheetData));
      document.getElementById("saveStatus").textContent = "synkronisert";
    } else {
      currentEntry = emptyEntry();
      localStorage.setItem("entry:" + dateStr, JSON.stringify(currentEntry));
      document.getElementById("saveStatus").textContent = "klar (tom dag i skyen)";
    }
  } else {
    if (localData) {
      currentEntry = localData;
      document.getElementById("saveStatus").textContent = "synkronisert (lokal)";
    } else {
      currentEntry = emptyEntry();
      document.getElementById("saveStatus").textContent = "klar";
    }
  }
  
  if (!currentEntry.health.vekt || weightDateLabel === "") {
    const fallback = findLastRegisteredWeight(dateStr);
    if (fallback && !currentEntry.health.vekt) { currentEntry.health.vekt = fallback.weight; weightDateLabel = fallback.label; }
  }
  
  renderAll(); 
  renderHistory();
  
  // NYTT I v2.0.9: Hvis Google Fit er tilkoblet, henter vi ALLTID de aller ferskeste helsedataene
  // i bakgrunnen med en gang du går inn på en dag. Dette sikrer at skritt og kalorier teller oppover
  // utover dagen, og ikke låser seg til verdien du hadde i morges!
  if (googleAccessToken) { 
    await fetchAllHealthData(dateStr); 
  }
}

async function handleDateChange(newDate) {
  clearTimeout(saveTimeout);
  if (document.getElementById("saveStatus").textContent === "endret…") {
    document.getElementById("saveStatus").textContent = "lagrer…";
    await executeSaveDirectly();
  }
  currentDate = newDate; document.getElementById("dateInput").value = currentDate; updateDateDisplay();
  await loadEntry(currentDate); renderHistory();
}

function renderHistory(){
  const el = document.getElementById("historyTable"); const keys = [];
  for(let i=0; i<localStorage.length; i++) { const k = localStorage.key(i); if(k.startsWith("entry:")) keys.push(k); }
  Object.keys(sheetEntries).forEach(d => keys.push("entry:" + d));
  const uniqueKeys = Array.from(new Set(keys)).sort().reverse();
  if(uniqueKeys.length === 0){ el.innerHTML = '<div class="empty">Ingen oppføringer ennå.</div>'; return; }
  const rows = [];
  for(const k of uniqueKeys.slice(0,10)){
    const date = k.replace("entry:","");
    let e = null; const stored = localStorage.getItem("entry:" + date); if(stored) e = JSON.parse(stored); if(!e && sheetEntries[date]) e = sheetEntries[date]; if(!e) e = emptyEntry();
    rows.push(`<tr><td class="rowdate" data-date="${date}">${date}</td><td>${Object.values(e.habits||{}).filter(Boolean).length}/${HABITS.length}</td><td>${e.scales?.brainfog ?? "–"}</td><td>${e.health?.co2_snitt || "–"}</td></tr>`);
  }
  el.innerHTML = `<table class="log"><thead><tr><th>Dato</th><th>Vaner</th><th>Brainfog</th><th>CO2 snitt</th></tr></thead><tbody>${rows.join("")}</tbody></table>`;
  el.querySelectorAll(".rowdate").forEach(td=>{ td.onclick = async ()=>{ await handleDateChange(td.dataset.date); }; });
}

function pad(n){return n<10?'0'+n:n;}
function shiftDate(dateStr, delta){ const d = new Date(dateStr+"T00:00:00"); d.setDate(d.getDate()+delta); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function formatNorwegian(dateStr){ const [y,m,d] = dateStr.split("-"); return `${d}.${m}.${y}`; }
function updateDateDisplay(){ document.getElementById("dateDisplay").textContent = formatNorwegian(currentDate); document.getElementById("nextDay").disabled = (currentDate >= todayStr); }

document.getElementById("dateInput").value = currentDate; updateDateDisplay();
document.getElementById("dateInput").onchange = async (e)=>{ if(e.target.value > todayStr) { e.target.value = currentDate; return; } await handleDateChange(e.target.value); };
document.getElementById("prevDay").onclick = async ()=>{ await handleDateChange(shiftDate(currentDate, -1)); };
document.getElementById("nextDay").onclick = async ()=>{ if(currentDate < todayStr) await handleDateChange(shiftDate(currentDate, 1)); };
document.getElementById("fetchHealthBtn").onclick = async () => { document.getElementById("saveStatus").textContent = "tvinger henting…"; await fetchAllHealthData(currentDate, true); };

loadEntry(currentDate); renderHistory();
</script>
